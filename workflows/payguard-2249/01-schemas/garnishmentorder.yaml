created_by: mukesh@mightybot.ai
description: Primary extraction schema — populated from court-issued garnishment order PDFs. The state field is the profile routing key.
is_active: true
is_primary: true
is_public: false
last_modified_by: mukesh@mightybot.ai
schema_definition:
    additionalProperties: false
    properties:
        balance_remaining:
            anyOf:
                - type: number
                - type: "null"
            default: None
            description: Total balance remaining on the judgment
        case_number:
            description: Court case number
            type: string
        creditor_name:
            anyOf:
                - type: string
                - type: "null"
            default: None
            description: Plaintiff/judgment creditor name
        debtor_name:
            description: Full name of the employee/debtor as on the order
            type: string
        debtor_ssn_last4:
            anyOf:
                - type: string
                - type: "null"
            default: None
            description: Last 4 of SSN for employee matching
        effective_date:
            anyOf:
                - format: date
                  type: string
                - type: "null"
            default: None
            description: Date garnishment takes effect (YYYY-MM-DD)
        employer_name:
            description: Name of the employer/garnishee
            type: string
        expiration_date:
            anyOf:
                - format: date
                  type: string
                - type: "null"
            default: None
            description: Explicit end date only. Set to null if order says until further order or until satisfied. NEVER reuse the filing date or effective date.
        interest_rate_pct:
            anyOf:
                - type: number
                - type: "null"
            default: None
            description: Annual interest rate as decimal (6 percent = 0.06)
        is_child_support_arrears:
            anyOf:
                - type: boolean
                - type: "null"
            default: None
            description: Arrears over 12 weeks raises CCPA ceiling
        is_head_of_household:
            anyOf:
                - type: boolean
                - type: "null"
            default: None
            description: Critical for FL (complete exemption) and CA (50 percent reduction)
        issuing_court:
            anyOf:
                - type: string
                - type: "null"
            default: None
            description: Full name of the issuing court
        order_type:
            description: Classification of garnishment - determines CCPA ceiling and calculation path
            enum:
                - CONSUMER_CREDITOR
                - CHILD_SUPPORT
                - IRS_TAX_LEVY
                - STATE_TAX_LEVY
                - FEDERAL_STUDENT_LOAN
                - BANKRUPTCY
                - FEDERAL_DEBT_AWG
            type: string
        ordered_amount:
            anyOf:
                - type: number
                - type: "null"
            default: None
            description: 'Fixed dollar amount to withhold PER PAY PERIOD. Set to null if percentage-based order. CRITICAL: Do NOT confuse employer processing fees or court costs with this. A 3 dollar processing fee is NOT the ordered amount.'
        ordered_percentage:
            anyOf:
                - type: number
                - type: "null"
            default: None
            description: Percentage of earnings to withhold as decimal (25 percent = 0.25). Set to null if fixed dollar amount.
        priority_position:
            anyOf:
                - type: integer
                - type: "null"
            default: None
            description: Position in multi-order stack (0 = only/first order)
        raw_text:
            anyOf:
                - type: string
                - type: "null"
            default: None
            description: Full extracted text from court order - kept for audit provenance
        state:
            description: Two-letter state code - THE PROFILE ROUTING KEY
            enum:
                - CA
                - TX
                - NY
                - OH
                - FL
                - IL
                - NJ
                - PA
                - GA
                - NC
            type: string
        supports_second_family:
            anyOf:
                - type: boolean
                - type: "null"
            default: None
            description: Supporting second family lowers CCPA ceiling
    required:
        - state
        - order_type
        - case_number
        - debtor_name
        - employer_name
    type: object
title: GarnishmentOrder
type: WEBHOOK
version: "1.0"
